<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>口算冲冲冲 | Math Rush Kids</title>
    <style>
      :root {
        color-scheme: light;
        --bg-1: #fff8e8;
        --bg-2: #e9f7ff;
        --card: rgba(255, 255, 255, 0.94);
        --text: #20304f;
        --muted: #5f6d8a;
        --pink: #ff6fae;
        --purple: #7c4dff;
        --yellow: #ffca42;
        --green: #1ecf8c;
        --blue: #4a87ff;
        --shadow: 0 18px 48px rgba(103, 116, 173, 0.18);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        font-family: 'Nunito', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', system-ui, sans-serif;
        background:
          radial-gradient(circle at 20% 10%, rgba(255, 111, 174, 0.22), transparent 28%),
          radial-gradient(circle at 80% 15%, rgba(255, 202, 66, 0.28), transparent 26%),
          linear-gradient(180deg, var(--bg-1), var(--bg-2));
        color: var(--text);
      }

      body {
        padding: 20px 12px 28px;
      }

      button,
      input {
        font: inherit;
      }

      button {
        border: 0;
        cursor: pointer;
      }

      #app {
        display: flex;
        justify-content: center;
      }

      .app-shell {
        position: relative;
        width: min(100%, 460px);
        min-height: calc(100vh - 40px);
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .top-glow {
        position: absolute;
        width: 160px;
        height: 160px;
        border-radius: 999px;
        filter: blur(18px);
        opacity: 0.45;
        z-index: 0;
      }

      .top-glow-left {
        top: 48px;
        left: -30px;
        background: rgba(255, 111, 174, 0.35);
      }

      .top-glow-right {
        top: 110px;
        right: -18px;
        background: rgba(74, 135, 255, 0.26);
      }

      .panel,
      .footer-note {
        position: relative;
        z-index: 1;
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 5px 10px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.7);
        color: var(--purple);
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.04em;
      }

      .hero-stats {
        display: grid;
        gap: 10px;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .hero-stat {
        min-width: 0;
        padding: 12px 14px;
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.7);
        box-shadow: inset 0 0 0 1px rgba(124, 77, 255, 0.08);
        text-align: left;
      }

      .stat-label {
        display: block;
        color: var(--muted);
        font-size: 12px;
        margin-bottom: 4px;
      }

      .panel {
        background: var(--card);
        border-radius: 28px;
        padding: 20px;
        box-shadow: var(--shadow);
        backdrop-filter: blur(10px);
      }

      .home-panel {
        padding: 18px;
      }

      .panel-banner {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
        margin-bottom: 12px;
        flex-wrap: wrap;
      }

      .home-panel h1,
      .panel-banner h2,
      .feedback-card h2,
      .award-card h2 {
        margin: 6px 0;
        font-size: 26px;
      }

      .home-panel h1 {
        line-height: 1.08;
      }

      .panel-banner p,
      .feedback-card p,
      .award-card p,
      .question-tip,
      .tiny-note,
      .quick-note,
      .footer-note,
      .result-message {
        color: var(--muted);
        line-height: 1.5;
      }

      .section-subtitle {
        margin: -4px 0 14px;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.45;
      }

      .banner-badge,
      .question-badge {
        display: inline-flex;
        align-items: center;
        padding: 8px 12px;
        border-radius: 999px;
        background: rgba(124, 77, 255, 0.1);
        color: var(--purple);
        font-weight: 800;
        font-size: 13px;
      }

      .mascot-card {
        width: 118px;
        min-width: 118px;
        padding: 14px 12px;
        border-radius: 24px;
        background: linear-gradient(180deg, rgba(255, 202, 66, 0.22), rgba(255, 255, 255, 0.72));
        text-align: center;
        font-weight: 800;
      }

      .mascot {
        font-size: 42px;
        margin-bottom: 8px;
      }

      .compact-home-banner {
        gap: 12px;
        margin-bottom: 10px;
      }

      .home-hero-copy {
        display: grid;
        gap: 12px;
        width: 100%;
      }

      .home-hero-topline {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        flex-wrap: wrap;
      }

      .home-title-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .compact-home-banner p {
        margin: 0;
      }

      .compact-mascot-card {
        width: 96px;
        min-width: 96px;
        padding: 12px 10px;
        border-radius: 20px;
        font-size: 14px;
      }

      .compact-mascot-card .mascot {
        margin-bottom: 4px;
        font-size: 34px;
      }

      .compact-stats {
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
      }

      .compact-stat {
        padding: 10px 12px;
        border-radius: 18px;
      }

      .compact-stat strong {
        display: block;
        font-size: 15px;
        line-height: 1.35;
      }

      .compact-stat-summary {
        grid-column: span 3;
      }

      .section-title {
        font-size: 14px;
        font-weight: 900;
        color: var(--muted);
        margin-bottom: 12px;
      }

      .op-grid,
      .difficulty-row,
      .result-grid,
      .setting-grid,
      .feedback-strip,
      .result-actions,
      .primary-actions {
        display: grid;
        gap: 12px;
      }

      .op-grid,
      .difficulty-row,
      .setting-grid,
      .result-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .op-card,
      .difficulty-pill,
      .key-btn,
      .ghost-btn,
      .secondary-btn,
      .submit-btn,
      .start-btn,
      .next-btn {
        border-radius: 22px;
        transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
      }

      .op-card,
      .difficulty-pill,
      .key-btn,
      .ghost-btn,
      .secondary-btn {
        background: #fff;
        color: var(--text);
        box-shadow: inset 0 0 0 1px rgba(124, 77, 255, 0.08);
      }

      .op-card,
      .difficulty-pill {
        padding: 16px 14px;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 8px;
        min-height: 112px;
      }

      .op-card.is-active,
      .difficulty-pill.is-active {
        background: linear-gradient(180deg, rgba(124, 77, 255, 0.12), rgba(74, 135, 255, 0.08));
        box-shadow: inset 0 0 0 2px rgba(124, 77, 255, 0.35);
      }

      .op-icon {
        width: 44px;
        height: 44px;
        display: inline-grid;
        place-items: center;
        border-radius: 14px;
        background: rgba(255, 111, 174, 0.12);
        color: var(--pink);
        font-size: 26px;
        font-weight: 900;
      }

      .primary-actions {
        margin: 16px 0;
      }

      .quick-note {
        font-size: 14px;
      }

      .start-btn,
      .next-btn,
      .submit-btn {
        width: 100%;
        padding: 16px 18px;
        background: linear-gradient(135deg, var(--pink), #ff9f50);
        color: #fff;
        font-size: 20px;
        font-weight: 900;
        box-shadow: 0 16px 24px rgba(255, 111, 174, 0.28);
      }

      .start-btn small {
        display: block;
        margin-top: 6px;
        font-size: 13px;
        font-weight: 700;
        opacity: 0.92;
      }

      .secondary-btn,
      .ghost-btn {
        width: 100%;
        padding: 14px 16px;
        font-size: 16px;
        font-weight: 800;
      }

      .ghost-btn {
        width: auto;
        min-width: 88px;
        background: rgba(255, 255, 255, 0.7);
      }

      .settings-card {
        margin-top: 8px;
        padding: 16px;
        border-radius: 24px;
        background: linear-gradient(180deg, rgba(74, 135, 255, 0.08), rgba(255, 255, 255, 0.74));
      }

      .settings-toggle {
        width: 100%;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        padding: 0;
        background: transparent;
        text-align: left;
      }

      .settings-title {
        display: block;
        margin-bottom: 6px;
      }

      .settings-toggle strong {
        display: block;
        font-size: 16px;
        line-height: 1.45;
        color: var(--text);
      }

      .settings-toggle-icon {
        flex: 0 0 auto;
        padding: 8px 12px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.82);
        color: var(--purple);
        font-size: 13px;
        font-weight: 900;
      }

      .settings-body {
        display: grid;
        gap: 12px;
        margin-top: 14px;
      }

      .settings-card.is-collapsed .settings-body {
        display: none;
      }

      .setting-item {
        display: grid;
        gap: 10px;
        padding: 14px;
        background: rgba(255, 255, 255, 0.8);
        border-radius: 20px;
      }

      .slider {
        width: 100%;
        accent-color: var(--purple);
      }

      .question-panel,
      .feedback-panel,
      .result-panel {
        display: grid;
        gap: 16px;
      }

      .progress-card,
      .question-card,
      .feedback-card,
      .award-card {
        border-radius: 28px;
      }

      .progress-card,
      .feedback-strip {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
      }

      .question-card {
        padding: 22px 18px;
        background: linear-gradient(180deg, rgba(74, 135, 255, 0.12), rgba(255, 255, 255, 0.96));
        text-align: center;
      }

      .question-text {
        margin: 18px 0 16px;
        font-size: clamp(46px, 13vw, 72px);
        font-weight: 900;
        color: var(--purple);
      }

      .question-text span {
        color: var(--pink);
      }

      .answer-display {
        min-height: 82px;
        display: grid;
        place-items: center;
        margin-bottom: 10px;
        border-radius: 22px;
        background: #fff;
        font-size: clamp(40px, 12vw, 60px);
        font-weight: 900;
        letter-spacing: 0.08em;
        color: var(--green);
      }

      .keypad {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
      }

      .key-btn {
        min-height: 74px;
        font-size: 28px;
        font-weight: 900;
      }

      .key-btn.soft {
        font-size: 20px;
        color: var(--purple);
      }

      .submit-btn {
        grid-column: 1 / -1;
      }

      .submit-btn:disabled {
        opacity: 0.55;
        box-shadow: none;
        cursor: not-allowed;
      }

      .feedback-card,
      .award-card {
        padding: 26px 20px;
        text-align: center;
      }

      .feedback-card.is-correct {
        background: linear-gradient(180deg, rgba(30, 207, 140, 0.16), rgba(255, 255, 255, 0.94));
      }

      .feedback-card.is-warm {
        background: linear-gradient(180deg, rgba(255, 202, 66, 0.18), rgba(255, 255, 255, 0.96));
      }

      .feedback-emoji,
      .award-badge {
        font-size: 50px;
      }

      .feedback-answer {
        margin: 16px 0;
        padding: 14px;
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.75);
      }

      .feedback-answer strong {
        display: block;
        margin-top: 8px;
        font-size: 36px;
        color: var(--blue);
      }

      .feedback-strip {
        padding: 14px 16px;
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.7);
        font-weight: 800;
      }

      .streak-bonus {
        margin: 14px 0 18px;
        padding: 14px 16px;
        border-radius: 20px;
        background: linear-gradient(135deg, rgba(255, 111, 174, 0.14), rgba(255, 202, 66, 0.2));
        color: #934200;
        font-weight: 900;
      }

      .award-card {
        background: linear-gradient(180deg, rgba(255, 202, 66, 0.24), rgba(255, 255, 255, 0.98));
      }

      .stars {
        margin: 10px 0 16px;
        font-size: 28px;
        letter-spacing: 0.16em;
      }

      .result-item {
        padding: 14px 12px;
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.78);
      }

      .result-item span {
        display: block;
        color: var(--muted);
        font-size: 13px;
        margin-bottom: 6px;
      }

      .result-item strong {
        font-size: 24px;
      }

      .result-actions {
        margin-top: 16px;
      }

      .footer-note {
        text-align: center;
        padding-bottom: 10px;
        font-size: 13px;
      }

      .op-card:hover,
      .difficulty-pill:hover,
      .key-btn:hover,
      .ghost-btn:hover,
      .secondary-btn:hover,
      .start-btn:hover,
      .submit-btn:hover,
      .next-btn:hover {
        transform: translateY(-2px);
      }

      @media (max-width: 420px) {
        body {
          padding: 16px 10px 24px;
        }

        .app-shell {
          gap: 12px;
        }

        .panel {
          padding: 16px;
          border-radius: 24px;
        }

        .home-panel {
          padding: 16px;
        }

        .hero-stats,
        .panel-banner,
        .progress-card,
        .feedback-strip,
        .result-actions,
        .difficulty-row,
        .setting-grid,
        .result-grid {
          grid-template-columns: 1fr;
          display: grid;
        }

        .panel-banner {
          align-items: flex-start;
          gap: 12px;
        }

        .home-panel h1,
        .panel-banner h2,
        .feedback-card h2,
        .award-card h2 {
          font-size: 22px;
        }

        .home-title-row {
          align-items: flex-start;
        }

        .home-hero-topline {
          gap: 6px;
        }

        .compact-stats {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .compact-stat-summary {
          grid-column: 1 / -1;
        }

        .mascot-card {
          width: 100%;
          min-width: 0;
          display: flex;
          align-items: center;
          justify-content: center;
          gap: 10px;
          padding: 12px 14px;
          text-align: left;
        }

        .compact-mascot-card {
          width: auto;
          min-width: 92px;
          justify-content: center;
          text-align: center;
          padding: 10px 12px;
        }

        .compact-mascot-card .mascot {
          margin-bottom: 0;
          font-size: 30px;
        }

        .mascot {
          margin-bottom: 0;
          font-size: 34px;
        }

        .op-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
          gap: 10px;
        }

        .op-card {
          min-height: 94px;
          padding: 12px 10px;
          gap: 6px;
          border-radius: 18px;
        }

        .op-card strong {
          font-size: 16px;
        }

        .op-card span:last-child {
          font-size: 12px;
          line-height: 1.35;
        }

        .op-icon {
          width: 36px;
          height: 36px;
          border-radius: 12px;
          font-size: 22px;
        }

        .primary-actions {
          gap: 10px;
          margin: 16px 0;
        }

        .start-btn,
        .next-btn,
        .submit-btn {
          padding: 15px 16px;
          font-size: 18px;
        }

        .start-btn small {
          font-size: 12px;
          line-height: 1.4;
        }

        .settings-card {
          padding: 14px;
          border-radius: 20px;
        }

        .settings-toggle {
          align-items: flex-start;
        }

        .settings-toggle strong {
          font-size: 14px;
        }

        .settings-toggle-icon {
          padding: 7px 10px;
          font-size: 12px;
        }

        .setting-item {
          padding: 12px;
          gap: 8px;
        }

        .difficulty-pill {
          min-height: 0;
          padding: 14px 12px;
        }

        .progress-card,
        .feedback-strip {
          gap: 10px;
        }

        .question-card {
          padding: 18px 14px;
        }

        .keypad {
          gap: 10px;
        }

        .key-btn {
          min-height: 66px;
          font-size: 24px;
        }
      }

      @media (max-width: 360px) {
        body {
          padding-inline: 8px;
        }

        .panel {
          padding: 14px;
        }

        .home-panel h1 {
          font-size: 21px;
        }

        .compact-home-banner {
          gap: 10px;
        }

        .compact-stat {
          padding: 9px 10px;
        }

        .compact-stat strong {
          font-size: 14px;
        }

        .op-grid {
          gap: 8px;
        }

        .op-card {
          min-height: 88px;
          padding: 10px 9px;
        }

        .op-card strong {
          font-size: 15px;
        }

        .op-card span:last-child {
          font-size: 11px;
        }

        .op-icon {
          width: 32px;
          height: 32px;
          font-size: 20px;
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/platform-web/src/main.ts"></script>
  </body>
</html>
